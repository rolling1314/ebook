<!DOCTYPE html>
<html>
<head>
    <title>Clear Storage</title>
</head>
<body>
    <h1>Clear LocalStorage</h1>
    <button onclick="clearStorage()">Clear All Data</button>
    <div id="result"></div>
    
    <script>
        function clearStorage() {
            localStorage.clear();
            document.getElementById('result').innerHTML = '<p style="color: green;">✓ LocalStorage cleared! Please close this tab and refresh the main app.</p>';
        }
        
        // Show current storage
        document.write('<h2>Current Storage:</h2>');
        document.write('<pre>' + JSON.stringify(localStorage, null, 2) + '</pre>');
    </script>
</body>
</html>
